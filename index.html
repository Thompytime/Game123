<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Originle — Forenames</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1a1a1a;--parchment:#f5f0e8;--parchment-deep:#e5ddd0;--accent:#c2703e;--accent-hover:#d4823f;--success:#2d8a5e;--success-bg:rgba(45,138,94,0.08);--error:#d44040;--error-bg:rgba(212,64,64,0.06);--muted:#8a8279;--clue-locked:#ddd8cf;--clue-active:#fffaf3;--shadow:rgba(26,26,26,0.06);--shadow-lg:rgba(26,26,26,0.15);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;}

    header{width:100%;text-align:center;padding:1rem 1rem 0.6rem;border-bottom:1px solid var(--parchment-deep);}
    .logo-area{display:flex;align-items:flex-start;justify-content:center;gap:0.5rem;margin-bottom:0.1rem;margin-left:-0.4rem;}
    .logo-area svg{flex-shrink:0;margin-top:0.1rem;}
    .logo-titles{text-align:left;}
    .logo-titles h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;letter-spacing:0.06em;color:var(--ink);line-height:1.1;}
    .logo-titles h1 span{color:var(--accent);}
    .logo-titles .subtitle{font-size:0.65rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-top:0.05rem;}
    .header-meta{font-size:0.7rem;color:var(--muted);margin-top:0.15rem;}
    .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:0.85rem;color:var(--muted);margin-top:0.1rem;}

    .game-shell{width:100%;max-width:660px;margin:0 auto;padding:0.55rem 1rem 2rem;display:flex;flex-direction:column;align-items:center;flex:1;}

    main{width:100%;max-width:560px;padding:0;display:flex;flex-direction:column;flex:1;}

    .category-badge{display:inline-block;font-size:0.65rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);background:rgba(194,112,62,0.1);padding:0.2rem 0.6rem;border-radius:100px;margin-bottom:0.5rem;align-self:flex-start;}

    .guess-history{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.4rem;min-height:0;}
    .guess-pill{display:inline-flex;align-items:center;gap:0.25rem;padding:0.2rem 0.55rem;border-radius:100px;font-size:0.75rem;font-weight:500;animation:pillPop 0.3s ease;}
    .guess-pill.wrong{background:var(--error-bg);border:1.5px solid var(--error);color:var(--error);}
    .guess-pill.correct{background:var(--success-bg);border:1.5px solid var(--success);color:var(--success);}
    @keyframes pillPop{0%{transform:scale(0.8);opacity:0;}100%{transform:scale(1);opacity:1;}}

    .guess-area{margin-bottom:0.6rem;}
    .guess-input-row{display:flex;gap:0.4rem;}
    .guess-input-row input{flex:1;padding:0.65rem 0.8rem;border:2px solid var(--parchment-deep);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.92rem;background:white;color:var(--ink);outline:none;transition:border-color 0.2s;}
    .guess-input-row input:focus{border-color:var(--accent);}
    .guess-input-row button{padding:0.65rem 1.1rem;border:none;border-radius:10px;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;transition:background 0.2s;}
    .guess-input-row button:hover{background:var(--accent-hover);}
    .guess-input-row button:disabled{background:var(--clue-locked);cursor:not-allowed;}
    .guesses-remaining{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:0.35rem;}

    .clues-container{display:flex;flex-direction:column;gap:0.3rem;}
    .clue-row{border-radius:8px;background:var(--clue-locked);transition:all 0.3s ease;opacity:0.4;overflow:hidden;}
    .clue-row.revealed{background:var(--clue-active);opacity:1;box-shadow:0 1px 6px var(--shadow);}
    .clue-header{display:flex;align-items:center;gap:0.5rem;padding:0.55rem 0.75rem;cursor:pointer;user-select:none;}
    .clue-row:not(.revealed) .clue-header{cursor:default;}
    .clue-number{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--accent);min-width:1.1rem;}
    .clue-difficulty{font-family:'DM Sans',sans-serif;font-size:0.6rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:0.1rem 0.4rem;border-radius:100px;flex-shrink:0;}
    .diff-impossible,.diff-hard,.diff-medium,.diff-easy{background:rgba(194,112,62,0.1);color:var(--accent);}
    .clue-summary{font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .clue-row.revealed .clue-summary{color:var(--ink);}
    .clue-row:not(.revealed) .clue-summary{filter:blur(4px);}
    .clue-chevron{font-size:0.6rem;color:var(--muted);transition:transform 0.2s;margin-left:auto;}
    .clue-row:not(.revealed) .clue-chevron{visibility:hidden;}
    .clue-row.open .clue-chevron{transform:rotate(180deg);}
    .clue-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease,padding 0.3s ease;padding:0 0.75rem;}
    .clue-row.open .clue-body{max-height:250px;padding:0 0.75rem 0.65rem;}
    .clue-body-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;line-height:1.5;color:var(--ink);}

    .share-bar{display:none;align-items:center;justify-content:center;gap:0.4rem;margin-top:0.6rem;padding:0.5rem;background:white;border-radius:10px;box-shadow:0 2px 8px var(--shadow);animation:fadeUp 0.4s ease;}
    .share-bar.visible{display:flex;}
    .share-bar-text{font-size:0.72rem;color:var(--muted);font-weight:500;}
    .share-bar button{padding:0.4rem 0.75rem;border:none;border-radius:8px;background:var(--accent);color:white;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.75rem;cursor:pointer;transition:background 0.2s;}
    .share-bar button:hover{background:var(--accent-hover);}
    .share-bar .btn-info{background:transparent;color:var(--accent);border:1.5px solid var(--accent);padding:0.35rem 0.65rem;}
    .share-bar .btn-info:hover{background:rgba(194,112,62,0.08);}

    .modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.3s ease;padding:0.75rem;}
    .modal-overlay.active{opacity:1;pointer-events:all;}
    .modal{background:var(--parchment);border-radius:16px;padding:1.4rem 1.4rem;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px var(--shadow-lg);transform:translateY(20px);transition:transform 0.3s ease;max-height:92vh;max-height:92dvh;overflow-y:auto;}
    .modal-overlay.active .modal{transform:translateY(0);}
    .modal-scroll-icon{margin-bottom:0.4rem;}
    .modal h2{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:0.1rem;}
    .modal h2.win{color:var(--success);} .modal h2.lose{color:var(--error);}
    .modal .modal-subtitle{font-size:0.82rem;color:var(--muted);margin-bottom:0.8rem;}
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.5rem;margin-bottom:0.8rem;}
    .stat-box{background:white;border-radius:8px;padding:0.45rem 0.3rem;box-shadow:0 2px 6px var(--shadow);}
    .stat-box .stat-num{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--ink);line-height:1.2;}
    .stat-box .stat-label{font-size:0.58rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-top:0.05rem;}
    .modal-origin{padding:0.85rem;margin-bottom:0.8rem;background:rgba(194,112,62,0.06);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;text-align:left;}
    .modal-origin h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:0.25rem;}
    .modal-origin p{font-family:'Cormorant Garamond',serif;font-size:0.9rem;line-height:1.55;color:var(--ink);}
    .share-text-preview{background:white;border-radius:8px;padding:0.65rem;font-family:monospace;font-size:0.7rem;line-height:1.45;text-align:left;color:var(--ink);margin-bottom:0.65rem;white-space:pre-line;box-shadow:0 2px 6px var(--shadow);}
    .modal-actions{display:flex;gap:0.4rem;}
    .modal-actions button{flex:1;padding:0.6rem 0.7rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
    .btn-share{background:var(--accent);color:white;border:none;} .btn-share:hover{background:var(--accent-hover);}
    .btn-close{background:white;color:var(--ink);border:2px solid var(--parchment-deep);} .btn-close:hover{border-color:var(--accent);}

    .countdown{text-align:center;margin-top:0.5rem;font-size:0.78rem;color:var(--muted);}
    .countdown strong{color:var(--accent);font-weight:700;font-family:'Cormorant Garamond',serif;font-size:1rem;}

    .copied-toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:white;padding:0.5rem 1rem;border-radius:100px;font-size:0.8rem;font-weight:500;opacity:0;transition:all 0.3s ease;z-index:2000;pointer-events:none;}
    .copied-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

    @media (max-width:640px){
      .game-shell{max-width:560px;padding:0.45rem 0.8rem 2rem;}
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-area">
      <svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="15" width="60" height="70" rx="4" fill="#f5f0e8" stroke="#c2703e" stroke-width="2.5"/>
        <ellipse cx="50" cy="15" rx="34" ry="8" fill="#ebe4d6" stroke="#c2703e" stroke-width="2.5"/>
        <ellipse cx="50" cy="85" rx="34" ry="8" fill="#ebe4d6" stroke="#c2703e" stroke-width="2.5"/>
        <circle cx="16" cy="15" r="5" fill="#c2703e" opacity="0.2"/><circle cx="16" cy="85" r="5" fill="#c2703e" opacity="0.2"/>
        <circle cx="84" cy="15" r="5" fill="#c2703e" opacity="0.2"/><circle cx="84" cy="85" r="5" fill="#c2703e" opacity="0.2"/>
        <line x1="32" y1="32" x2="68" y2="32" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
        <line x1="32" y1="42" x2="62" y2="42" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
        <line x1="32" y1="52" x2="66" y2="52" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
        <line x1="32" y1="62" x2="58" y2="62" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
        <path d="M70 70Q74 60 72 50" stroke="#c2703e" stroke-width="1.5" fill="none" opacity="0.3"/>
      </svg>
      <div class="logo-titles">
        <h1>Origin<span>le</span></h1>
        <div class="subtitle">Forenames</div>
      </div>
    </div>
    <div class="header-meta">Daily Name Origins Quiz</div>
    <div class="tagline">We don't name and shame, we name and explain.</div>
  </header>

  <div class="game-shell" id="gameShell">
    <main>
      <div class="category-badge" id="categoryBadge"></div>
      <div class="guess-history" id="guessHistory"></div>
      <div class="guess-area" id="guessArea">
        <div class="guess-input-row">
          <input type="text" id="guessInput" placeholder="Type a name..." autocomplete="off"/>
          <button id="guessBtn" onclick="submitGuess()">Guess</button>
        </div>
        <p class="guesses-remaining" id="guessesRemaining"></p>
      </div>
      <div class="clues-container" id="cluesContainer"></div>
      <div class="share-bar" id="shareBar">
        <span class="share-bar-text">Game complete!</span>
        <button class="btn-info" onclick="showModalAgain()">View Stats</button>
        <button onclick="copyShare()">Share</button>
      </div>
      <div class="countdown" id="countdown"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal" id="resultModal"></div>
  </div>
  <div class="copied-toast" id="copiedToast">Copied to clipboard!</div>

  <script>
    const QUIZZES = [
      {
        id: 1, answer: "Christopher", category: "Greek",
        origin: "From the Greek Christós (anointed one) + phérein (to bear). Literal meaning: 'bearer of the anointed one'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "In early Eastern Christian art, this name's legendary namesake was depicted as a dog-headed giant \u2014 a cynocephalus \u2014 said to have come from a land of cannibals." },
          { difficulty: "Hard", category: "Origin Story", text: "The man who first received this name was originally called 'Reprobus'. He was renamed after carrying a child across a river who grew impossibly heavy, revealing he bore the weight of the entire world." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "This name follows an ancient Greek theophoric pattern meaning 'bearer of [a divine figure]' \u2014 the same structure as 'Diophoros', meaning 'bearer of Zeus'." },
          { difficulty: "Easy", category: "Etymology", text: "From the Greek words for 'anointed one' + 'to bear/carry'. Literal meaning: 'bearer of the anointed one'." }
        ]
      },
      {
        id: 2, answer: "Alexander", category: "Greek",
        origin: "From the Greek aléxein (to defend) + anēr (man). Literal meaning: 'defender of men'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "In the medieval 'Romance' tradition about this name's most famous bearer, he was said to have built a wall of iron and brass to imprison the nations of Gog and Magog until the end of time." },
          { difficulty: "Hard", category: "Origin Story", text: "Paris of Troy bore this as an alternative name in Homer's Iliad. It was originally a Mycenaean-era epithet for a warrior who shields his people from danger." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "Built from two Proto-Greek roots: one meaning 'to ward off' and another meaning 'man' or 'warrior' \u2014 the same 'man' root found in the name Andrew." },
          { difficulty: "Easy", category: "Etymology", text: "From the Greek aléxein (to defend) + anēr (man). Literal meaning: 'defender of men'." }
        ]
      },
      {
        id: 3, answer: "Margaret", category: "Persian / Greek",
        origin: "From the Persian marvārīd, via Greek. Literal meaning: 'pearl'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "This name's patron saint was said to have been swallowed alive by Satan in the form of a dragon, then burst out of its belly unharmed by making the sign of the cross." },
          { difficulty: "Hard", category: "Origin Story", text: "The name traces back to a borrowed Persian word \u2014 'marvārīd' \u2014 for a lustrous concretion found inside oysters, which the Greeks adopted and turned into a given name." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "Unusually for a Western name, it derives from a luxury commodity rather than a virtue, deity, or warrior quality. The original Persian root passed through Greek and Latin before reaching Old French." },
          { difficulty: "Easy", category: "Etymology", text: "From the Persian marvārīd, via Greek. Literal meaning: 'pearl'." }
        ]
      },
      {
        id: 4, answer: "Theodore", category: "Greek",
        origin: "From the Greek theós (god) + dōron (gift). Literal meaning: 'gift of God'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "One of the earliest bearers was a Roman soldier who burned down a pagan temple to Cybele in Amasea. His feast day is so important in the Eastern Church that a special wheat dish called 'kollyva' is prepared in his honour." },
          { difficulty: "Hard", category: "Origin Story", text: "This name is the exact mirror-image of another common name: both use the same two Greek roots but in reversed order. The reversed form is a well-known feminine name meaning exactly the same thing." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "Built from two Greek words \u2014 one meaning 'god' (found in 'theology') and one meaning 'gift' (found in 'Pandora', meaning 'all gifts')." },
          { difficulty: "Easy", category: "Etymology", text: "From the Greek theós (god) + dōron (gift). Literal meaning: 'gift of God'." }
        ]
      },
      {
        id: 5, answer: "Philip", category: "Greek",
        origin: "From the Greek phílos (loving) + híppos (horse). Literal meaning: 'lover of horses'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "This name's earliest royal bearer chose it for his son as propaganda \u2014 advertising his victories at the Olympic chariot races and his mastery of mounted warfare in 4th-century BC Macedonia." },
          { difficulty: "Hard", category: "Origin Story", text: "The name was virtually unknown outside one kingdom until a single king made it synonymous with military ambition, and his world-conquering son carried it to the edges of the known world." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "A Greek compound: the first root means 'fond of' (the same root in 'philosophy' and 'philanthropy'), and the second refers to a specific animal central to ancient cavalry warfare." },
          { difficulty: "Easy", category: "Etymology", text: "From the Greek phílos (loving) + híppos (horse). Literal meaning: 'lover of horses'." }
        ]
      },
      {
        id: 6, answer: "Catherine", category: "Greek",
        origin: "Likely from the Greek Hekateríne (related to Hecate), later linked to katharós. Associated meaning: 'pure'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "This name's most famous early saint was sentenced to death on a spiked breaking wheel, but when she touched it the wheel shattered \u2014 which is why a type of spinning firework is named after her." },
          { difficulty: "Hard", category: "Origin Story", text: "The original Greek form may derive from the name of the goddess Hecate. Early Christians later altered the spelling by inserting a silent letter to connect it to a Greek word meaning 'pure'." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "The spelling was deliberately changed in the medieval period to link it to the Greek word 'katharós' \u2014 the same root that gives us 'catharsis' \u2014 meaning ritual purification." },
          { difficulty: "Easy", category: "Etymology", text: "Likely from the Greek Hekateríne (related to Hecate), later linked to katharós. Associated meaning: 'pure'." }
        ]
      },
      {
        id: 7, answer: "Edward", category: "Old English",
        origin: "From the Old English ēad (wealth) + weard (guardian). Literal meaning: 'guardian of wealth'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "An early bearer of this name was murdered at Corfe Castle at age 16 and later canonised \u2014 pilgrims reported that his bones could cure the blind." },
          { difficulty: "Hard", category: "Origin Story", text: "This name survived the Norman Conquest of 1066 because a single pre-Conquest king \u2014 known as 'the Confessor' \u2014 was so venerated that the Norman conquerors adopted his name for their own children." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "An Old English compound: the first element means 'wealth' or 'prosperity', and the second is the ancestor of the modern English word 'ward' \u2014 meaning a guardian or protector." },
          { difficulty: "Easy", category: "Etymology", text: "From the Old English ēad (wealth) + weard (guardian). Literal meaning: 'guardian of wealth'." }
        ]
      },
      {
        id: 8, answer: "Nicholas", category: "Greek",
        origin: "From the Greek níkē (victory) + laós (people). Literal meaning: 'victory of the people'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "This name's patron saint was said to have resurrected three boys who had been murdered by a butcher, salted, and hidden in a pickling barrel \u2014 a story depicted in medieval stained glass across France." },
          { difficulty: "Hard", category: "Origin Story", text: "The historical figure behind the name was a 4th-century bishop from Myra in modern-day Turkey. Sailors adopted him as their patron after legends claimed he calmed a deadly storm through prayer." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "A Greek compound whose second element means 'people' or 'the common folk' (the root in 'laity'). The first element is the Greek word for victory, also the name of a winged goddess." },
          { difficulty: "Easy", category: "Etymology", text: "From the Greek níkē (victory) + laós (people). Literal meaning: 'victory of the people'." }
        ]
      },
      {
        id: 9, answer: "Elizabeth", category: "Hebrew",
        origin: "From the Hebrew 'El' (God) + 'shevua' (oath). Literal meaning: 'God is my oath'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "This name first appears in the Book of Exodus \u2014 not for a queen or prophet, but as the wife of Aaron, Moses's brother. She is given no dialogue in the entire Torah." },
          { difficulty: "Hard", category: "Origin Story", text: "The name gained Christian importance from a woman described in Luke's Gospel as elderly and barren, who miraculously conceived a son who would grow up to baptise people in the River Jordan." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "A Hebrew compound of three elements: one meaning 'God', another related to 'oath' or the sacred number seven. It conveys a sense of divine covenant or binding promise." },
          { difficulty: "Easy", category: "Etymology", text: "From the Hebrew 'El' (God) + 'shevua' (oath). Literal meaning: 'God is my oath'." }
        ]
      },
      {
        id: 10, answer: "William", category: "Germanic",
        origin: "From the Germanic wil (will, desire) + helm (helmet, protection). Literal meaning: 'resolute protector'.",
        clues: [
          { difficulty: "Impossible", category: "Obscure Lore", text: "The earliest form of this name appears in 7th-century Frankish records. It was rare until a duke of Aquitaine renounced his title to become a monk, was canonised, and made it fashionable among nobility." },
          { difficulty: "Hard", category: "Origin Story", text: "This name was virtually unknown in England before 1066. A single military invasion made it the most common male name in the country \u2014 roughly one in five men bore it by the 13th century." },
          { difficulty: "Medium", category: "Linguistic DNA", text: "A Germanic compound: the first element means 'will' or 'desire', and the second means 'helmet' or 'protection' \u2014 a warrior metaphor for armoured resolve in battle." },
          { difficulty: "Easy", category: "Etymology", text: "From the Germanic wil (will, desire) + helm (helmet, protection). Literal meaning: 'resolute protector'." }
        ]
      },
      {
        id: 11, answer: "Penelope", category: "Greek",
        origin: "Possibly from the Greek pēnē (thread/weft). The faithful wife of Odysseus who wove and unwove for twenty years.",

    const MAX_GUESSES = 6;
    const SK = 'originle_daily_progress';
    const TK = 'originle_daily_stats';

    let todayQuiz = null;
    let todayKey = '';
    let gu = 0;
    let go = false;
    let savedState = null;
    let stats = { played: 0, won: 0, streak: 0, maxStreak: 0, gd: [0,0,0,0,0,0] };

    function $(id) { return document.getElementById(id); }

    function escapeHtml(v) {
      return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function getTodayString() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function getDailyQuiz() {
      const today = getTodayString();
      const epoch = new Date('2026-04-24');
      const now = new Date(today);
      const daysSinceEpoch = Math.floor((now - epoch) / (1000 * 60 * 60 * 24));
      const idx = ((daysSinceEpoch % QUIZZES.length) + QUIZZES.length) % QUIZZES.length;
      return { quiz: QUIZZES[idx], dateKey: today, dayNumber: daysSinceEpoch + 1 };
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(SK);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed.dateKey === todayKey) return parsed;
        }
      } catch(_){}
      return null;
    }

    function saveProgress() {
      try {
        localStorage.setItem(SK, JSON.stringify({
          dateKey: todayKey,
          guesses: savedState ? savedState.guesses : [],
          won: savedState ? savedState.won : null
        }));
      } catch(_){}
    }

    function loadStats() {
      try {
        const raw = localStorage.getItem(TK);
        if (raw) stats = JSON.parse(raw);
      } catch(_){}
    }

    function saveStats() {
      try { localStorage.setItem(TK, JSON.stringify(stats)); } catch(_){}
    }

    function boot() {
      const daily = getDailyQuiz();
      todayQuiz = daily.quiz;
      todayKey = daily.dateKey;
      todayQuiz._dayNumber = daily.dayNumber;

      loadStats();
      savedState = loadProgress();

      if (savedState && savedState.won !== null) {
        gu = savedState.guesses.length;
        go = true;
      } else if (savedState) {
        gu = savedState.guesses.length;
        go = false;
      } else {
        savedState = { dateKey: todayKey, guesses: [], won: null };
        gu = 0;
        go = false;
      }

      renderGame();
    }

    function getDiffClass(d) {
      if (d === 'Impossible') return 'diff-impossible';
      if (d === 'Hard') return 'diff-hard';
      if (d === 'Medium') return 'diff-medium';
      return 'diff-easy';
    }

    function renderGame() {
      const q = todayQuiz;
      $('categoryBadge').textContent = q.category + ' Origin \u2014 #' + q._dayNumber;

      const c = $('cluesContainer');
      c.innerHTML = '';
      q.clues.forEach((cl, i) => {
        const r = document.createElement('div');
        r.className = 'clue-row';
        const rev = i === 0 || i < gu + 1 || go;
        if (rev) r.classList.add('revealed');
        const isLatest = rev && (go ? i === q.clues.length - 1 : i === Math.min(gu, q.clues.length - 1));
        if (isLatest) r.classList.add('open');
        const sum = cl.text.length > 50 ? cl.text.substring(0, 50) + '\u2026' : cl.text;
        r.innerHTML =
          '<div class="clue-header" onclick="togClue(this)">' +
            '<span class="clue-number">' + (i + 1) + '</span>' +
            '<span class="clue-difficulty ' + getDiffClass(cl.difficulty) + '">' + escapeHtml(cl.difficulty) + '</span>' +
            '<span class="clue-summary">' + escapeHtml(sum) + '</span>' +
            '<span class="clue-chevron">\u25BC</span>' +
          '</div>' +
          '<div class="clue-body"><div class="clue-body-text">' + escapeHtml(cl.text) + '</div></div>';
        c.appendChild(r);
      });

      const inp = $('guessInput');
      const btn = $('guessBtn');
      const rem = $('guessesRemaining');
      const hist = $('guessHistory');
      const sb = $('shareBar');
      const cd = $('countdown');
      inp.value = '';
      hist.innerHTML = '';

      if (go && savedState) {
        savedState.guesses.forEach(g => addPill(g, q.answer));
        inp.disabled = true;
        btn.disabled = true;
        rem.textContent = 'Completed';
        sb.classList.add('visible');
        startCountdown();
      } else {
        if (savedState && savedState.guesses.length > 0) {
          savedState.guesses.forEach(g => addPill(g, q.answer));
        }
        inp.disabled = false;
        btn.disabled = false;
        rem.textContent = (MAX_GUESSES - gu) + ' guesses remaining';
        sb.classList.remove('visible');
        cd.innerHTML = '';
        inp.focus();
      }

      inp.onkeydown = (e) => { if (e.key === 'Enter') submitGuess(); };
    }

    function togClue(h) {
      const r = h.parentElement;
      if (!r.classList.contains('revealed')) return;
      r.classList.toggle('open');
    }

    function submitGuess() {
      if (go || !todayQuiz) return;
      const q = todayQuiz;
      const inp = $('guessInput');
      const g = inp.value.trim();
      if (!g) return;

      savedState.guesses.push(g);
      gu = savedState.guesses.length;
      addPill(g, q.answer);
      inp.value = '';

      if (g.toLowerCase() === q.answer.toLowerCase()) {
        endGame(true);
        return;
      }

      const rows = document.querySelectorAll('.clue-row');
      rows.forEach(r => r.classList.remove('open'));
      if (gu < q.clues.length && rows[gu]) {
        rows[gu].classList.add('revealed');
        rows[gu].classList.add('open');
      }
      $('guessesRemaining').textContent = (MAX_GUESSES - gu) + ' guesses remaining';

      if (gu >= MAX_GUESSES) endGame(false);
      else saveProgress();
    }

    function endGame(won) {
      savedState.won = won;
      go = true;
      stats.played++;
      if (won) {
        stats.won++;
        stats.streak++;
        if (stats.streak > stats.maxStreak) stats.maxStreak = stats.streak;
        if (gu - 1 < stats.gd.length) stats.gd[gu - 1]++;
      } else {
        stats.streak = 0;
      }
      saveProgress();
      saveStats();
      revealAll();
      showModal(won);
      $('guessInput').disabled = true;
      $('guessBtn').disabled = true;
      $('guessesRemaining').textContent = 'Completed';
      $('shareBar').classList.add('visible');
      startCountdown();
    }

    function addPill(g, a) {
      const h = $('guessHistory');
      const p = document.createElement('div');
      const ok = g.toLowerCase() === a.toLowerCase();
      p.className = 'guess-pill ' + (ok ? 'correct' : 'wrong');
      p.innerHTML = '<span>' + (ok ? '\u2713' : '\u2717') + '</span><span>' + escapeHtml(g) + '</span>';
      h.appendChild(p);
    }

    function revealAll() {
      document.querySelectorAll('.clue-row').forEach(r => {
        r.classList.add('revealed');
        r.classList.remove('open');
      });
    }

    function startCountdown() {
      const cd = $('countdown');
      function update() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        const diff = tomorrow - now;
        const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        cd.innerHTML = 'Next name in <strong>' + h + ':' + m + ':' + s + '</strong>';
      }
      update();
      setInterval(update, 1000);
    }

    function buildShare(won, num, gc) {
      const emojis = ['\uD83D\uDFE9', '\uD83D\uDFE8', '\uD83D\uDFE7', '\uD83D\uDFE5'];
      const labels = ['Impossible', 'Hard', 'Medium', 'Easy'];
      const grey = '\u2B1C';
      const miss = '\u2B1B';
      if (!won) {
        return '\uD83D\uDCDC Originle \u2014 Forenames #' + num + '\nX/4 \u2014 Clueless\n\n' + miss.repeat(4) + '\n\noriginle.com';
      }
      let s = '';
      for (let i = 0; i < gc; i++) {
        s += (i === gc - 1) ? emojis[i] : grey;
      }
      return '\uD83D\uDCDC Originle \u2014 Forenames #' + num + '\n' + gc + '/4 \u2014 ' + labels[gc - 1] + '\n\n' + s + '\n\noriginle.com';
    }

    function showModal(won) {
      const q = todayQuiz;
      const num = q._dayNumber;
      const gc = savedState.guesses.length;
      const wp = stats.played > 0 ? Math.round((stats.won / stats.played) * 100) : 0;
      const stxt = buildShare(won, num, gc);
      $('resultModal').innerHTML =
        '<div class="modal-scroll-icon"><svg width="30" height="30" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="15" width="60" height="70" rx="4" fill="#f5f0e8" stroke="#c2703e" stroke-width="2.5"/><ellipse cx="50" cy="15" rx="34" ry="8" fill="#ebe4d6" stroke="#c2703e" stroke-width="2.5"/><ellipse cx="50" cy="85" rx="34" ry="8" fill="#ebe4d6" stroke="#c2703e" stroke-width="2.5"/><line x1="32" y1="35" x2="68" y2="35" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.4"/><line x1="32" y1="50" x2="62" y2="50" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.3"/><line x1="32" y1="65" x2="66" y2="65" stroke="#c2703e" stroke-width="2" stroke-linecap="round" opacity="0.4"/></svg></div>' +
        '<h2 class="' + (won ? 'win' : 'lose') + '">' + escapeHtml(won ? q.answer + '!' : 'The answer was ' + q.answer) + '</h2>' +
        '<p class="modal-subtitle">' + escapeHtml(won ? 'Well done \u2014 ' + gc + '/' + MAX_GUESSES + '!' : 'Better luck tomorrow!') + '</p>' +
        '<div class="stat-grid"><div class="stat-box"><div class="stat-num">' + stats.played + '</div><div class="stat-label">Played</div></div><div class="stat-box"><div class="stat-num">' + wp + '%</div><div class="stat-label">Win Rate</div></div><div class="stat-box"><div class="stat-num">' + stats.streak + '</div><div class="stat-label">Streak</div></div></div>' +
        '<div class="modal-origin"><h3>' + escapeHtml(q.answer) + '</h3><p>' + escapeHtml(q.origin) + '</p></div>' +
        '<div class="share-text-preview" id="sharePreview">' + escapeHtml(stxt) + '</div>' +
        '<div class="modal-actions"><button class="btn-close" onclick="closeModal()">Close</button><button class="btn-share" onclick="copyShare()">Share Results</button></div>';
      $('modalOverlay').classList.add('active');
    }

    function showModalAgain() {
      if (!savedState || savedState.won === null) return;
      showModal(savedState.won);
    }

    function copyShare() {
      const preview = $('sharePreview');
      if (!preview) return;
      const t = preview.textContent;
      navigator.clipboard.writeText(t).then(toast).catch(() => {
        const a = document.createElement('textarea');
        a.value = t;
        document.body.appendChild(a);
        a.select();
        document.execCommand('copy');
        document.body.removeChild(a);
        toast();
      });
    }

    function toast() {
      const t = $('copiedToast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function closeModal() { $('modalOverlay').classList.remove('active'); }
    function closeModalOutside(e) { if (e.target === $('modalOverlay')) closeModal(); }

    boot();
  </script>
</body>
</html>
